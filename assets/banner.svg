<svg viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="100%" stop-color="#8E0000"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="180" fill="#0d0d0d"/>

  <!-- speed streaks -->
  <polygon points="0,140 300,60 330,60 30,140" fill="url(#redGrad)" opacity="0.9"/>
  <polygon points="0,170 260,90 280,90 20,170" fill="url(#redGrad)" opacity="0.6"/>
  <polygon points="900,40 620,120 590,120 870,40" fill="url(#redGrad)" opacity="0.9"/>
  <polygon points="900,10 640,90 620,90 880,10" fill="url(#redGrad)" opacity="0.6"/>

  <rect x="4" y="4" width="892" height="172" fill="none" stroke="#FF0000" stroke-width="3"/>

  <text x="450" y="105" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="52" font-weight="900" font-style="italic" fill="#ffffff">
    Tejinder <tspan fill="#FF0000">|</tspan> Tj
  </text>
</svg>
